<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoVoice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: rgba(0, 0, 0, 0.80);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      overflow: hidden;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 24px;
    }

    .waveform .bar {
      width: 3px;
      border-radius: 2px;
      background: #4ade80;
      animation: wave 1.2s ease-in-out infinite;
    }

    .waveform .bar:nth-child(1) { height: 8px;  animation-delay: 0.0s; }
    .waveform .bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .waveform .bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
    .waveform .bar:nth-child(4) { height: 24px; animation-delay: 0.3s; }
    .waveform .bar:nth-child(5) { height: 18px; animation-delay: 0.4s; }
    .waveform .bar:nth-child(6) { height: 12px; animation-delay: 0.5s; }
    .waveform .bar:nth-child(7) { height: 6px;  animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.3); }
    }

    .label {
      color: rgb(255, 255, 255, 0.6);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="waveform">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <span class="label">Listening</span>
  </div>
</body>
</html>
