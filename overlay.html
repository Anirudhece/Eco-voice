<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoVoice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: rgba(0, 0, 0, 0.80);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      overflow: hidden;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
    }

    /* ── Waveform bars ── */
    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 24px;
    }

    .waveform .bar {
      width: 3px;
      border-radius: 2px;
      background: #4ade80;
      transition: background 0.3s;
    }

    body.recording .waveform .bar {
      animation: wave 1.2s ease-in-out infinite;
    }

    body.processing .waveform .bar {
      animation: pulse 0.8s ease-in-out infinite;
      background: #fbbf24;
    }

    body.error .waveform .bar {
      background: #ef4444;
      animation: none;
    }

    body.idle .waveform .bar {
      background: rgba(74, 222, 128, 0.4);
      animation: none;
    }

    .waveform .bar:nth-child(1) { height: 8px;  animation-delay: 0.0s; }
    .waveform .bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .waveform .bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
    .waveform .bar:nth-child(4) { height: 24px; animation-delay: 0.3s; }
    .waveform .bar:nth-child(5) { height: 18px; animation-delay: 0.4s; }
    .waveform .bar:nth-child(6) { height: 12px; animation-delay: 0.5s; }
    .waveform .bar:nth-child(7) { height: 6px;  animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.3); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.4; transform: scaleY(0.5); }
    }

    /* ── Label ── */
    .label {
      color: rgb(255, 255, 255, 0.6);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    body.recording .label {
      color: rgb(255, 255, 255, 0.9);
    }

    body.error .label {
      color: #ef4444;
      font-weight: 600;
    }

    /* ── Recording dot ── */
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      opacity: 0;
      transition: opacity 0.2s;
    }

    body.recording .dot {
      opacity: 1;
      animation: blink 0.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Processing spinner ── */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(251, 191, 36, 0.3);
      border-top-color: #fbbf24;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    body.processing .spinner {
      display: block;
    }

    body.recording .spinner,
    body.idle .spinner,
    body.error .spinner {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Close button ── */
    .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .close-btn:hover {
      opacity: 1;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
    }

    /* ── Polish toggle ── */
    .polish-toggle {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      padding: 0;
    }

    .polish-toggle:hover {
      border-color: rgba(255, 255, 255, 0.5);
      color: rgba(255, 255, 255, 0.7);
    }

    .polish-toggle.active {
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.2);
      color: #a78bfa;
    }

    .polish-toggle.active:hover {
      border-color: #c4b5fd;
      color: #c4b5fd;
    }

    body.processing .polish-toggle.active ~ .label {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body class="idle">
  <div class="container">
    <button class="close-btn" id="closeBtn" title="Close">✕</button>
    <div class="waveform" id="waveform">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="spinner" id="spinner"></div>
    <button class="polish-toggle" id="polishToggle" title="Grammar Polish">✦</button>
    <span class="label" id="label">EcoVoice</span>
    <div class="dot" id="dot"></div>
  </div>

  <script>
    (() => {
      const label = document.getElementById("label");
      const polishToggle = document.getElementById("polishToggle");
      let mediaRecorder = null;
      let audioChunks = [];
      let micStream = null;
      let polishMode = false;

      function setBodyState(state) {
        document.body.className = state;
      }

      function cleanUpMedia() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        if (micStream) {
          micStream.getTracks().forEach(t => t.stop());
          micStream = null;
        }
      }

      async function startRecording() {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

          const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
            ? "audio/webm;codecs=opus"
            : "audio/webm";

          mediaRecorder = new MediaRecorder(micStream, { mimeType });
          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
          };

          mediaRecorder.onstop = async () => {
            micStream.getTracks().forEach(t => t.stop());
            micStream = null;

            if (audioChunks.length === 0) {
              finishIdle();
              return;
            }

            setBodyState("processing");
            label.textContent = polishMode ? "Polishing..." : "Processing...";

            const blob = new Blob(audioChunks, { type: "audio/webm" });
            const arrayBuffer = await blob.arrayBuffer();

            try {
              await window.ecoVoice.transcribe(arrayBuffer);
            } catch (err) {
              console.error("Transcribe failed:", err);
              setBodyState("error");
              label.textContent = "Transcription failed";
              window.ecoVoice.recordingComplete();
            }
          };

          mediaRecorder.start();
          setBodyState("recording");
          label.textContent = "Listening";
        } catch (err) {
          console.error("Mic error:", err);
          setBodyState("error");
          label.textContent = err.name === "NotAllowedError"
            ? "Mic access denied"
            : "Mic error";
        }
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        } else if (micStream) {
          micStream.getTracks().forEach(t => t.stop());
          micStream = null;
          finishIdle();
        } else {
          finishIdle();
        }
      }

      function updatePolishUI() {
        polishToggle.classList.toggle("active", polishMode);
        if (polishMode) {
          document.body.classList.add("polish-active");
        } else {
          document.body.classList.remove("polish-active");
        }
      }

      function finishIdle() {
        setBodyState("idle");
        label.textContent = polishMode ? "Polish" : "EcoVoice";
        window.ecoVoice.recordingComplete();
      }

      // Listen for audio-state changes from main process
      window.ecoVoice.onAudioStateChange((state) => {
        if (typeof state === "object" && state.state === "error") {
          setBodyState("error");
          label.textContent = state.message || "Error";
          return;
        }

        if (state === "recording") {
          startRecording();
        } else if (state === "idle") {
          stopRecording();
        }
      });

      // Listen for transcription results
      window.ecoVoice.onTranscribeResult((result) => {
        setBodyState("idle");
        label.textContent = polishMode ? "Polish" : "EcoVoice";
      });

      // Polish toggle
      polishToggle.addEventListener("click", () => {
        polishMode = !polishMode;
        updatePolishUI();
        window.ecoVoice.setPolishMode(polishMode);
        if (document.body.className === "idle") {
          label.textContent = polishMode ? "Polish" : "EcoVoice";
        }
      });

      // Load initial polish mode from main process
      window.ecoVoice.getPolishMode().then((enabled) => {
        polishMode = enabled;
        updatePolishUI();
        if (document.body.className === "idle") {
          label.textContent = polishMode ? "Polish" : "EcoVoice";
        }
      });

      // Initialize: ask main process for current state
      window.ecoVoice.getAudioState().then((state) => {
        if (state === "recording") {
          startRecording();
        }
      });

      // Close button
      document.getElementById("closeBtn").addEventListener("click", () => {
        cleanUpMedia();
        window.ecoVoice.closeOverlay();
      });

      // Escape key closes overlay
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          cleanUpMedia();
          window.ecoVoice.closeOverlay();
        }
      });
    })();
  </script>
</body>
</html>
